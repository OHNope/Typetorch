        with:
          path: |
            tests/package-consumer/.xmake
            tests/package-consumer/build
          key: ${{ runner.os }}-gcc16-package-consumer-build-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua', 'tests/package-consumer/xmake.lua', 'scripts/env.sh') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gcc16-package-consumer-build-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua', 'tests/package-consumer/xmake.lua', 'scripts/env.sh') }}-
