name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON: python3
  BUILD_JOBS: "2"
  XMAKE_ROOT: "y"

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120

    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            unzip \
            git \
            file \
            binutils \
            python3 \
            python3-dev \
            python3-venv \
            pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache xmake installation
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure environment
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"
          source scripts/env.sh
          bash scripts/check_env.sh

      - name: Configure debug build
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build tensor arithmetic test
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_tensor_arithmetic_test

      - name: Run tensor arithmetic test
        run: |
          source scripts/env.sh
          xmake run typetorch_tensor_arithmetic_test

      - name: Build Python C API extension
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_capi_ext