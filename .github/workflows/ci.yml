          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Build and run package consumer test
        run: |
          source scripts/env.sh
          xmake f -P tests/package-consumer -m debug --yes
          xmake build -P tests/package-consumer -j "$BUILD_JOBS" package_consumer
          xmake run -P tests/package-consumer package_consumer
