      - name: Cache xmake build outputs
        uses: actions/cache@v4
        with:
          path: |
            .xmake
            build
          key: ${{ runner.os }}-gcc16-capi-build-${{ hashFiles('xmake.lua', 'packages/**/xmake.lua', 'scripts/env.sh') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gcc16-capi-build-${{ hashFiles('xmake.lua', 'packages/**/xmake.lua', 'scripts/env.sh') }}-
            ${{ runner.os }}-gcc16-capi-build-

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build Python C API extension
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_capi_ext

  probes:
    name: Build and run size probes
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
