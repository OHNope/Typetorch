name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON: python3
  BUILD_JOBS: "2"
  XMAKE_ROOT: "y"

jobs:
  changes:
    name: Detect CI-relevant changes
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.changes.outputs.run }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CI-relevant changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$BASE_SHA"
          else
            base="$BEFORE_SHA"
          fi

          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run=false
          while IFS= read -r path; do
            case "$path" in
              README.md|LICENSE|AGENTS.md|docs/*|.vscode/*|\
              .gitignore|.clang-format|.clangd)
                ;;
              *)
                run=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "$HEAD_SHA")

          echo "run=$run" >> "$GITHUB_OUTPUT"

  environment:
    name: Environment probe
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Check environment
        run: |
          source scripts/env.sh
          bash scripts/check_env.sh

  core-tests:
    name: Build and run core C++ tests
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-

      - name: Cache xmake build outputs
        uses: actions/cache@v4
        with:
          path: |
            .xmake
            build
          key: ${{ runner.os }}-gcc16-core-build-${{ hashFiles('xmake.lua', 'packages/**/xmake.lua', 'scripts/env.sh') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gcc16-core-build-${{ hashFiles('xmake.lua', 'packages/**/xmake.lua', 'scripts/env.sh') }}-
            ${{ runner.os }}-gcc16-core-build-

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build typetorch_cpp_debug
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_cpp_debug

      - name: Run typetorch_cpp_debug
        run: |
          source scripts/env.sh
          xmake run typetorch_cpp_debug

      - name: Build tensor arithmetic test
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_tensor_arithmetic_test

      - name: Run tensor arithmetic test
        run: |
          source scripts/env.sh
          xmake run typetorch_tensor_arithmetic_test

  capi-extension:
