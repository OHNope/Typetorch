            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure debug build
        run: |
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build tensor arithmetic test
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_tensor_arithmetic_test

      - name: Run tensor arithmetic test
        run: |
          source scripts/env.sh
          xmake run typetorch_tensor_arithmetic_test

  capi-extension:
    name: Build Python C API extension
    needs: detect-changes
    if: needs.detect-changes.outputs.capi == 'true'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Install system packages
        run: |
