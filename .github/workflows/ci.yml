            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache xmake installation
        uses: actions/cache@v4
        with:
          path: |
