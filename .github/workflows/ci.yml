name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON: python3
  BUILD_JOBS: "2"
  XMAKE_ROOT: "y"

jobs:
  environment:
    name: Environment probe
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/environment
          cache-key: ${{ runner.os }}-gcc16-ci-success-environment-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/**', 'packages/**') }}

      - name: Install system packages
        if: steps.ci.outputs.run == 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        if: steps.ci.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Install xmake
        if: steps.ci.outputs.run == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        if: steps.ci.outputs.run == 'true'
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Check environment
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          bash scripts/check_env.sh

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/environment
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  core-tests:
    name: Build and run core C++ tests
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/core-tests
          cache-key: ${{ runner.os }}-gcc16-ci-success-core-tests-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/env.sh', 'scripts/bootstrap_xmake.sh', 'packages/l/libtorch-bin/xmake.lua', 'src/**', 'third_party/fast_io/**', 'examples/**', 'tests/tensor_arithmetic_test.cpp') }}

      - name: Install system packages
        if: steps.ci.outputs.run == 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        if: steps.ci.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Cache xmake packages
        if: steps.ci.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-

      - name: Install xmake
        if: steps.ci.outputs.run == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        if: steps.ci.outputs.run == 'true'
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build typetorch_cpp_debug
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_cpp_debug

      - name: Run typetorch_cpp_debug
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake run typetorch_cpp_debug

      - name: Build tensor arithmetic test
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_tensor_arithmetic_test

      - name: Run tensor arithmetic test
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake run typetorch_tensor_arithmetic_test

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/core-tests
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  capi-extension:
    name: Build Python C API extension
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/capi-extension
          cache-key: ${{ runner.os }}-gcc16-ci-success-capi-extension-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/env.sh', 'scripts/bootstrap_xmake.sh', 'packages/l/libtorch-bin/xmake.lua', 'src/**', 'third_party/fast_io/**', 'bindings/**') }}

      - name: Install system packages
        if: steps.ci.outputs.run == 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        if: steps.ci.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Cache xmake packages
        if: steps.ci.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-

      - name: Install xmake
        if: steps.ci.outputs.run == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        if: steps.ci.outputs.run == 'true'
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build Python C API extension
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_capi_ext

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/capi-extension
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  probes:
    name: Build and run size probes
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/probes
          cache-key: ${{ runner.os }}-gcc16-ci-success-probes-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/env.sh', 'scripts/bootstrap_xmake.sh', 'scripts/check_env.sh', 'scripts/nm_size_probe.sh', 'packages/l/libtorch-bin/xmake.lua', 'src/**', 'third_party/fast_io/**', 'tests/binary_size_*') }}

      - name: Install system packages
        if: steps.ci.outputs.run == 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
