name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON: python3
  BUILD_JOBS: "2"
  XMAKE_ROOT: "y"
  TYPETORCH_LIBTORCH_VARIANT: cpu

jobs:
  changes:
    name: Detect CI-relevant changes
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.changes.outputs.run }}
      need_packages: ${{ steps.changes.outputs.need_packages }}
      sdk_debug: ${{ steps.changes.outputs.sdk_debug }}
      cpp_tests: ${{ steps.changes.outputs.cpp_tests }}
      coverage: ${{ steps.changes.outputs.coverage }}
      capi: ${{ steps.changes.outputs.capi }}
      size_probes: ${{ steps.changes.outputs.size_probes }}
      package_consumer: ${{ steps.changes.outputs.package_consumer }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect CI-relevant changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          emit_all() {
            {
              echo "run=true"
              echo "need_packages=true"
              echo "sdk_debug=true"
              echo "cpp_tests=true"
              echo "coverage=true"
              echo "capi=true"
              echo "size_probes=true"
              echo "package_consumer=true"
            } >> "$GITHUB_OUTPUT"
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            emit_all
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$BASE_SHA"
          else
            base="$BEFORE_SHA"
          fi

          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            emit_all
            exit 0
          fi

          run=false
          need_packages=false
          sdk_debug=false
          cpp_tests=false
          coverage=false
          capi=false
          size_probes=false
          package_consumer=false

          mark_all_builds() {
            run=true
            need_packages=true
            sdk_debug=true
            cpp_tests=true
            coverage=true
            capi=true
            size_probes=true
            package_consumer=true
          }

          while IFS= read -r path; do
            case "$path" in
              README.md|LICENSE|AGENTS.md|docs/*|.vscode/*|\
              .gitignore|.clang-format|.clangd)
                ;;
              .github/workflows/*|.github/actions/*)
                run=true
                ;;
              xmake.lua|xmake_package.lua|xmake_typetorch_modules.lua|packages/*|packages/**|\
              scripts/*|scripts/**|third_party/*|third_party/**)
                mark_all_builds
                ;;
              src/bindings/*|src/bindings/**)
                run=true
                need_packages=true
                capi=true
                ;;
              src/*|src/**)
                mark_all_builds
                ;;
              examples/*|examples/**)
                run=true
                need_packages=true
                sdk_debug=true
                cpp_tests=true
                coverage=true
                ;;
              tests/package-consumer/*|tests/package-consumer/**)
                run=true
                need_packages=true
                package_consumer=true
                ;;
              tests/binary_size_*)
                run=true
                need_packages=true
                sdk_debug=true
                size_probes=true
                ;;
              tests/*|tests/**)
                run=true
                need_packages=true
                sdk_debug=true
                cpp_tests=true
                coverage=true
                ;;
              *)
                mark_all_builds
                ;;
            esac
          done < <(git diff --name-only "$base" "$HEAD_SHA")

          {
            echo "run=$run"
            echo "need_packages=$need_packages"
            echo "sdk_debug=$sdk_debug"
            echo "cpp_tests=$cpp_tests"
            echo "coverage=$coverage"
            echo "capi=$capi"
            echo "size_probes=$size_probes"
            echo "package_consumer=$package_consumer"
          } >> "$GITHUB_OUTPUT"

  package-cache:
    name: Prepare xmake package cache
    needs: changes
    if: needs.changes.outputs.need_packages == 'true'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Restore xmake installation
        id: xmake-install-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Save xmake installation
        if: steps.xmake-install-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ steps.xmake-install-cache.outputs.cache-primary-key }}

      - name: Restore xmake packages
        id: xmake-package-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.xmake/packages
          key: ${{ runner.os }}-gcc16-xmake-packages-cpu-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-packages-cpu-

      - name: Install xmake packages
        if: steps.xmake-package-cache.outputs.cache-hit != 'true'
        run: |
          source scripts/env.sh
          xmake require --yes

      - name: Save xmake packages
        if: steps.xmake-package-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.xmake/packages
          key: ${{ steps.xmake-package-cache.outputs.cache-primary-key }}

  sdk-debug:
    name: Build Typetorch SDK (debug)
    needs: [changes, package-cache]
    if: needs.changes.outputs.sdk_debug == 'true' && needs.package-cache.result == 'success'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Restore xmake installation
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Restore xmake packages
        uses: actions/cache/restore@v5
        with:
          path: ~/.xmake/packages
          key: ${{ runner.os }}-gcc16-xmake-packages-cpu-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua') }}

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build SDK
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_sdk

      - name: Upload SDK build artifact
        uses: actions/upload-artifact@v7
        with:
          name: typetorch-sdk-debug
          path: |
            .xmake/linux/x86_64
            build/.deps/typetorch_sdk
            build/.gens/typetorch_sdk
            build/.objs/typetorch_sdk
            build/linux/x86_64/debug/libtypetorch_sdk.a
          include-hidden-files: true
          compression-level: 1
          retention-days: 1

  cpp-tests:
    name: Build and run C++ tests (${{ matrix.suite }})
    needs: [changes, package-cache, sdk-debug]
    if: needs.changes.outputs.cpp_tests == 'true' && needs.package-cache.result == 'success' && needs.sdk-debug.result == 'success'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: core-debug
            targets: typetorch_cpp_debug
          - suite: tensor
            targets: typetorch_tensor_arithmetic_test typetorch_tensor_factory_view_test
          - suite: nnmodules-linear-conv
            targets: typetorch_nnmodules_linear_test typetorch_nnmodules_conv2d_test
          - suite: nnmodules-embedding-pooling
            targets: typetorch_nnmodules_embedding_test typetorch_nnmodules_pooling_test
          - suite: nnmodules-normalization
            targets: typetorch_nnmodules_layer_norm_test typetorch_nnmodules_rms_norm_test
          - suite: nnmodules-composition
            targets: typetorch_nnmodules_sequential_test typetorch_nnmodules_mlp_test typetorch_nnmodules_wrappers_test
          - suite: nnmodules-transformer
            targets: typetorch_nnmodules_transformer_test
    env:
      TEST_TARGETS: ${{ matrix.targets }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Restore xmake installation
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Restore xmake packages
        uses: actions/cache/restore@v5
        with:
          path: ~/.xmake/packages
          key: ${{ runner.os }}-gcc16-xmake-packages-cpu-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua') }}

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Download SDK build artifact
        uses: actions/download-artifact@v7
        with:
          name: typetorch-sdk-debug
          path: .

      - name: Check environment
        run: |
          source scripts/env.sh
          bash scripts/check_env.sh

      - name: Build C++ test targets
        run: |
          source scripts/env.sh
          for target in $TEST_TARGETS; do
            xmake build -j "$BUILD_JOBS" "$target"
          done

      - name: Run C++ tests
        run: |
          source scripts/env.sh
          for target in $TEST_TARGETS; do
            xmake run "$target"
          done

  coverage:
    name: Generate and upload coverage
    needs: [changes, package-cache]
    if: needs.changes.outputs.coverage == 'true' && needs.package-cache.result == 'success'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils gnupg jq \
            python3 python3-dev python3-venv pkg-config gcovr
          rm -rf /var/lib/apt/lists/*

      - name: Restore xmake installation
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Restore xmake packages
        uses: actions/cache/restore@v5
        with:
          path: ~/.xmake/packages
          key: ${{ runner.os }}-gcc16-xmake-packages-cpu-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua') }}

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure coverage build
        run: |
          source scripts/env.sh
          xmake f -m coverage --yes --python="$PYTHON"

      - name: Build and run coverage tests
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_sdk
          test_targets=(
            typetorch_cpp_debug
            typetorch_tensor_arithmetic_test
            typetorch_tensor_factory_view_test
            typetorch_nnmodules_linear_test
            typetorch_nnmodules_conv2d_test
            typetorch_nnmodules_embedding_test
            typetorch_nnmodules_layer_norm_test
            typetorch_nnmodules_rms_norm_test
            typetorch_nnmodules_sequential_test
            typetorch_nnmodules_mlp_test
            typetorch_nnmodules_wrappers_test
            typetorch_nnmodules_pooling_test
            typetorch_nnmodules_transformer_test
          )
          for target in "${test_targets[@]}"; do
            xmake build -j "$BUILD_JOBS" "$target"
            xmake run "$target"
          done

      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --filter 'src/typetorch/' \
            --exclude 'tests/' \
            --exclude 'examples/' \
            --exclude 'benchmarks/' \
            --xml-pretty \
            --output coverage.xml \
            build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: cpp
          name: typetorch-cpp
          disable_search: true
          fail_ci_if_error: true

  capi-extension:
    name: Build Python C API extension
    needs: [changes, package-cache]
    if: needs.changes.outputs.capi == 'true' && needs.package-cache.result == 'success'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Restore xmake installation
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Restore xmake packages
        uses: actions/cache/restore@v5
        with:
          path: ~/.xmake/packages
          key: ${{ runner.os }}-gcc16-xmake-packages-cpu-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua') }}

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Build Python C API extension
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_capi_ext

  size-probes:
    name: Size probe (${{ matrix.probe }})
    needs: [changes, package-cache, sdk-debug]
    if: needs.changes.outputs.size_probes == 'true' && needs.package-cache.result == 'success' && needs.sdk-debug.result == 'success'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - probe: tensor
            target: binary_size_tensor_probe
            symbol_filter: typetorch
          - probe: tensor-checked
            target: binary_size_tensor_checked_probe
            symbol_filter: typetorch
          - probe: tensor-unsafe
            target: binary_size_tensor_unsafe_probe
            symbol_filter: typetorch
          - probe: libtorch-native
            target: binary_size_libtorch_probe
            symbol_filter: typetorch_binary_size_libtorch_probe
    env:
      PROBE_TARGET: ${{ matrix.target }}
      PROBE_SYMBOL_FILTER: ${{ matrix.symbol_filter }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl unzip git file binutils \
            python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Restore xmake installation
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Restore xmake packages
        uses: actions/cache/restore@v5
        with:
          path: ~/.xmake/packages
          key: ${{ runner.os }}-gcc16-xmake-packages-cpu-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua') }}

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Download SDK build artifact
        uses: actions/download-artifact@v7
        with:
          name: typetorch-sdk-debug
          path: .

      - name: Build size probe
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" "$PROBE_TARGET"

      - name: Inspect size probe
        run: |
          source scripts/env.sh
          probe_path="build/linux/x86_64/debug/$PROBE_TARGET"
          if [ ! -x "$probe_path" ]; then
            echo "failed to locate size probe binary: $probe_path" >&2
            exit 1
          fi
          echo "-- binary --"
          ls -lh "$probe_path"
          echo
          echo "-- size --"
          size "$probe_path" || true
          echo
          echo "-- symbols --"
          nm -S --size-sort --demangle "$probe_path" 2>/dev/null |
            sed -n "/$PROBE_SYMBOL_FILTER/p" |
            tail -n "${MAX_LINES:-80}"

  package-consumer:
    name: Test add_requires() package consumption
    needs: [changes, package-cache]
    if: needs.changes.outputs.package_consumer == 'true' && needs.package-cache.result == 'success'
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends             ca-certificates curl unzip git file binutils             python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Restore xmake installation
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Restore xmake packages
        uses: actions/cache/restore@v5
        with:
          path: ~/.xmake/packages
          key: ${{ runner.os }}-gcc16-xmake-packages-cpu-${{ hashFiles('xmake.lua', 'xmake_package.lua', 'packages/**/xmake.lua') }}

      - name: Install xmake
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Build and run package consumer test
        run: |
          source scripts/env.sh
          xmake f -P tests/package-consumer -m debug --yes
          xmake build -P tests/package-consumer -j "$BUILD_JOBS" package_consumer
          xmake run -P tests/package-consumer package_consumer
