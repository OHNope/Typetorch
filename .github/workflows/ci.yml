      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends             ca-certificates curl unzip git file binutils             python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
