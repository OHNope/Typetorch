          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        if: steps.ci.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/xmake
            ~/.local/bin/xrepo
            ~/.local/share/xmake
          key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-install-

      - name: Cache xmake packages
        if: steps.ci.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-gcc16-xmake-

      - name: Install xmake
        if: steps.ci.outputs.run == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v xmake >/dev/null 2>&1; then
            bash scripts/bootstrap_xmake.sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          xmake --version

      - name: Configure Python include path
        if: steps.ci.outputs.run == 'true'
        run: |
          echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
          python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

      - name: Configure debug build
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake f -m debug --yes --python="$PYTHON"

      - name: Check environment
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          bash scripts/check_env.sh

      - name: Run size probes
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          bash scripts/nm_size_probe.sh debug

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/probes
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  package-consumer:
    name: Test add_requires() package consumption
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/package-consumer
          cache-key: ${{ runner.os }}-gcc16-ci-success-package-consumer-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'xmake_package.lua', 'scripts/**', 'packages/**', 'src/**', 'third_party/fast_io/**', 'tests/package-consumer/**') }}

      - name: Install system packages
        if: steps.ci.outputs.run == 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends             ca-certificates curl unzip git file binutils             python3 python3-dev python3-venv pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Cache xmake installation
        if: steps.ci.outputs.run == 'true'
