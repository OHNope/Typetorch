name: Setup xmake build environment
description: Install system packages, restore xmake caches, and optionally configure xmake.

inputs:
  cache-packages:
    required: false
    default: "false"
    description: Restore the xmake package cache.
  configure:
    required: false
    default: "none"
    description: Use "debug" to run xmake f.
  check-env:
    required: false
    default: "false"
    description: Run scripts/check_env.sh.
  xmake-install-cache-key:
    required: true
    description: Primary cache key for the xmake installation cache.
  xmake-install-restore-prefix:
    required: true
    description: Restore-key prefix for the xmake installation cache.
  xmake-package-cache-key:
    required: false
    default: ""
    description: Primary cache key for the xmake package cache.
  xmake-package-restore-prefix:
    required: false
    default: ""
    description: Restore-key prefix for the xmake package cache.

runs:
  using: composite
  steps:
    - name: Install system packages
      shell: bash
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          ca-certificates curl unzip git file binutils \
          python3 python3-dev python3-venv pkg-config
        rm -rf /var/lib/apt/lists/*

    - name: Restore xmake installation
      id: xmake-install-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.local/bin/xmake
          ~/.local/bin/xrepo
          ~/.local/share/xmake
        key: ${{ inputs.xmake-install-cache-key }}
        restore-keys: |
          ${{ inputs.xmake-install-restore-prefix }}

    - name: Restore xmake packages
      id: xmake-package-cache
      if: inputs.cache-packages == 'true'
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.xmake/packages
          ~/.xmake/cache
        key: ${{ inputs.xmake-package-cache-key }}
        restore-keys: |
          ${{ inputs.xmake-package-restore-prefix }}

    - name: Install xmake
      shell: bash
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        if ! command -v xmake >/dev/null 2>&1; then
          bash scripts/bootstrap_xmake.sh
        fi
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        xmake --version

    - name: Save xmake installation
      if: steps.xmake-install-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      continue-on-error: true
      with:
        path: |
          ~/.local/bin/xmake
          ~/.local/bin/xrepo
          ~/.local/share/xmake
        key: ${{ steps.xmake-install-cache.outputs.cache-primary-key }}

    - name: Configure Python include path
      shell: bash
      run: |
        echo "PYTHON=$PYTHON" >> "$GITHUB_ENV"
        python_include="$($PYTHON -c 'import sysconfig; print(sysconfig.get_path("include"))')"
        echo "PYTHON_INCLUDE_DIR=$python_include" >> "$GITHUB_ENV"

    - name: Configure debug build
      if: inputs.configure == 'debug'
      shell: bash
      run: |
        source scripts/env.sh
        xmake f -m debug --yes --python="$PYTHON"

    - name: Check environment
      if: inputs.check-env == 'true'
      shell: bash
      run: |
        source scripts/env.sh
        bash scripts/check_env.sh

    - name: Save xmake packages
      if: inputs.cache-packages == 'true' && steps.xmake-package-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      continue-on-error: true
      with:
        path: |
          ~/.xmake/packages
          ~/.xmake/cache
        key: ${{ steps.xmake-package-cache.outputs.cache-primary-key }}
